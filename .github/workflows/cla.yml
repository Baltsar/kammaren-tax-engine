name: CLA

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  check:
    name: CLA signed
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write
    steps:
      - name: Check CLA checkbox
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body ?? '';
            const signed = /\[x\]\s+I have read the \[CLA\]/i.test(body);

            if (!signed) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: [
                  '**CLA required.** Please check the CLA box in the PR description to proceed.',
                  '',
                  '> By submitting a pull request, you assign all copyright in your contribution',
                  '> to Gustaf Baltsar Garnow, enabling dual licensing under AGPL-3.0 and',
                  '> commercial terms.',
                  '',
                  'See [CLA.md](../blob/main/CLA.md) for details.',
                ].join('\n'),
              });
              core.setFailed('CLA checkbox not checked. Tick the box in the PR description.');
            }
